project:
  name: ROSCO
  source_dir: rosco/controller/src
  build_dir: rosco/controller/build
kgen:
  path: /workspace/KGen/bin/kgen
  build_cmd: cd /workspace/ROSCO/rosco/controller/build && cmake --build .
  run_cmd: cd /workspace/ROSCO/Examples && python3 vit_sim.py
  clean_cmd: cd /workspace/ROSCO/rosco/controller/build && make clean
  install_cmd: cp /workspace/ROSCO/rosco/controller/build/libdiscon.so /workspace/ROSCO/rosco/lib/libdiscon.so
  invocation: 0:0:1-20
build_system:
  type: cmake
  cmake_file: rosco/controller/CMakeLists.txt
  target_name: discon
fortran:
  kind_aliases:
    ReKi: REAL(8)
    DbKi: REAL(8)
    SiKi: REAL(4)
    IntKi: INTEGER(4)
  compiler: gfortran
  flags: -fdefault-real-8 -fdefault-double-8
verification:
  tolerance: 1.0e-14
translations:
  saturate:
    status: integrated
    cpp_file: translations/Functions/saturate.cpp
  wrap_180:
    status: integrated
    cpp_file: translations/Functions/wrap_180.cpp
  wrap_360:
    status: integrated
    cpp_file: translations/Functions/wrap_360.cpp
  interp1d:
    status: integrated
    cpp_file: translations/Functions/interp1d.cpp
  identity:
    status: integrated
    cpp_file: translations/Functions/identity.cpp
  ColemanTransform:
    status: integrated
    cpp_file: translations/Functions/colemantransform.cpp
  ColemanTransformInverse:
    status: integrated
    cpp_file: translations/Functions/colemantransforminverse.cpp
  ratelimit:
    status: integrated
    cpp_file: translations/Functions/ratelimit.cpp
  sigma:
    status: integrated
    cpp_file: translations/Functions/sigma.cpp
  LPFilter:
    status: integrated
    cpp_file: translations/Filters/lpfilter.cpp
  HPFilter:
    status: integrated
    cpp_file: translations/Filters/hpfilter.cpp
  SecLPFilter:
    status: integrated
    cpp_file: translations/Filters/seclpfilter.cpp
  NotchFilter:
    status: integrated
    cpp_file: translations/Filters/notchfilter.cpp
  NotchFilterSlopes:
    status: integrated
    cpp_file: translations/Filters/notchfilterslopes.cpp
  SecLPFilter_Vel:
    status: integrated
    cpp_file: translations/Filters/seclpfilter_vel.cpp
