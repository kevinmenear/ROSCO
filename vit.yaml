project:
  name: ROSCO
  source_dir: rosco/controller/src
  build_dir: rosco/controller/build
kgen:
  path: /workspace/KGen/bin/kgen
  build_cmd: cd /workspace/ROSCO/rosco/controller/build && cmake --build .
  run_cmd: cd /workspace/ROSCO/Examples && python3 04_simple_sim.py
  clean_cmd: cd /workspace/ROSCO/rosco/controller/build && make clean
  install_cmd: cp /workspace/ROSCO/rosco/controller/build/libdiscon.so /workspace/ROSCO/rosco/lib/libdiscon.so
  invocation: 0:0:1-20
build_system:
  type: cmake
  cmake_file: rosco/controller/CMakeLists.txt
  target_name: discon
fortran:
  kind_aliases:
    ReKi: REAL(8)
    DbKi: REAL(8)
    SiKi: REAL(4)
    IntKi: INTEGER(4)
  compiler: gfortran
verification:
  tolerance: 1.0e-14
translations:
  saturate:
    status: verified
    cases_passed: 40
    cases_total: 40
    cases_skipped: 0
    cpp_file: translations/Functions/saturate.cpp
    kernel_dir: kernel/saturate
  wrap_180:
    status: verified
    cases_passed: 40
    cases_total: 40
    cases_skipped: 0
    cpp_file: translations/Functions/wrap_180.cpp
    kernel_dir: kernel/wrap_180
  interp1d:
    status: integrated
    cpp_file: interp1d.cpp
